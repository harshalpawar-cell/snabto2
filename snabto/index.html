<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snabto — Home Care Services</title>
  <meta name="description" content="Snabto: Trusted home care services — cleaning, plumber, electrician, car wash & more at your doorstep." />
  <meta name="theme-color" content="#0D9488" />

  <!-- Favicon (logo as data URL inline) -->
  <link rel="icon" type="image/png" href="src/favicon.png" />

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- React 18 (production CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #E5E7EB;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      height: 100%;
    }

    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea { font-family: inherit; outline: none; }
    a { text-decoration: none; }

    /* Snabto brand name */
    .snabto-name {
      font-family: 'Nunito', -apple-system, sans-serif;
      font-weight: 900;
      color: #0D9488;
      letter-spacing: -0.3px;
    }

    /* Scrollable content area */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 110px;
      -webkit-overflow-scrolling: touch;
    }

    /* Smooth fade-in for page transitions */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.2s ease forwards; }

    /* Booking card hover */
    .booking-card:hover {
      box-shadow: 0 4px 16px rgba(13, 148, 136, 0.12);
      border-color: #0D9488 !important;
    }

    /* Service card hover */
    .service-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .service-card { transition: transform 0.15s, box-shadow 0.15s; }

    /* Bottom nav active indicator */
    .nav-item-active { color: #0D9488 !important; border-top: 2.5px solid #0D9488 !important; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

    /* Input focus */
    input:focus, textarea:focus {
      border-color: #0D9488 !important;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
    }

    /* Mobile optimizations */
    @media (max-width: 430px) {
      .scroll-area { padding: 14px 16px 100px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Image data (base64 embedded, no server needed) -->
  <script src="src/images.js"></script>

  <!-- Main app -->
  <script src="src/app.js"></script>
</body>
</html>
